services:
  odionchat:
    build: .
    container_name: odionchat
    ports:
      - "${HOST_PORT:-3000}:8080"
    volumes: # Persistent storage (SQLite database, embeddings cache, etc.)
      - ./data:/app/backend/data
    env_file:
      - .env
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
